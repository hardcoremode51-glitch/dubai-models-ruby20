<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#e02040;--red2:#c01830;--red3:#ff3358;
  --gold:#e0b840;--gold2:#d4a820;
  --black:#060306;--black2:#100810;--black3:#180c14;
  --border:rgba(224,32,64,.22);--border2:rgba(224,32,64,.38);
  --white:#ffffff;--off:#e8d8de;--dim:#a88898;--dim2:#7a6070;--text:#c8a8b8;
  --wa:#25d366;--tg:#2aabee;
  --font-d:'Cormorant Garamond',serif;--font-s:'EB Garamond',serif;--font-b:'Rajdhani',sans-serif;
  --nav-h:68px;
}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--text);font-family:var(--font-b);min-height:100vh;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
button{border:none;background:none;font-family:inherit;cursor:pointer;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--black2);}
::-webkit-scrollbar-thumb{background:var(--red);}

/* ── LOADER ── */
#page-loader{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center;transition:opacity .5s ease;}
#page-loader.hidden{opacity:0;pointer-events:none;}
.loader-inner{display:flex;flex-direction:column;align-items:center;gap:1rem;}
.loader-gem{animation:gemSpin 1.8s ease-in-out infinite;filter:drop-shadow(0 0 18px rgba(224,32,64,.7));}
@keyframes gemSpin{0%{transform:scale(.85) rotate(-8deg);opacity:.6;}50%{transform:scale(1.1) rotate(8deg);opacity:1;}100%{transform:scale(.85) rotate(-8deg);opacity:.6;}}
.loader-name{font-family:var(--font-b);font-size:.85rem;font-weight:700;letter-spacing:.6em;color:rgba(255,255,255,.55);animation:loaderNameFade 1.8s ease-in-out infinite;}
.loader-name span{color:var(--red3);margin-left:.15em;}
@keyframes loaderNameFade{0%,100%{opacity:.4;letter-spacing:.55em;}50%{opacity:1;letter-spacing:.65em;}}
.loader-bar{width:120px;height:2px;background:rgba(255,255,255,.08);overflow:hidden;}
.loader-bar-fill{height:100%;width:40%;background:linear-gradient(90deg,transparent,var(--red3),transparent);animation:loaderBar 1.4s ease-in-out infinite;}
@keyframes loaderBar{0%{transform:translateX(-150%);}100%{transform:translateX(400%);}}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;z-index:900;height:var(--nav-h);display:flex;align-items:center;padding:0 2rem;background:rgba(6,3,6,.98);border-bottom:2px solid var(--border2);box-shadow:0 2px 20px rgba(212,33,60,.12);}
.nav-inner{width:100%;max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:1.2rem;}
.nav-logo{display:flex;align-items:center;gap:.6rem;text-decoration:none;flex-shrink:0;}
.nav-logo-text{font-family:var(--font-b);font-size:.9rem;font-weight:600;letter-spacing:.38em;color:var(--white);text-transform:uppercase;}
.nav-links-desktop{display:flex;gap:2rem;flex:1;justify-content:center;}
.nav-links-desktop a{font-size:.68rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);transition:color .2s;}
.nav-links-desktop a:hover,.nav-links-desktop a.active{color:var(--white);}
.nav-links-desktop a.active{border-bottom:2px solid var(--red);padding-bottom:2px;}
.nav-cta-desk{display:flex;align-items:center;gap:.55rem;flex-shrink:0;}
.nav-burger{display:none;flex-direction:column;gap:5px;padding:6px;cursor:pointer;background:none;border:none;flex-shrink:0;margin-left:auto;}
.nav-burger span{display:block;width:22px;height:2px;background:var(--white);transition:all .25s;}
.nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.nav-burger.open span:nth-child(2){opacity:0;}
.nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mob-fav{display:none;font-size:1.1rem;color:var(--dim);padding:4px 6px;text-decoration:none;flex-shrink:0;}
@media(max-width:700px){
  .nav{padding:0 1rem;}
  .nav-links-desktop,.nav-cta-desk{display:none;}
  .nav-burger{display:flex;}
  .mob-fav{display:block;}
}
.nav-spacer{display:block;width:100%;height:var(--nav-h);flex-shrink:0;}

/* ── DRAWER ── */
.nav-drawer{position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;z-index:850;background:rgba(6,3,6,.99);border-top:2px solid var(--border);padding:2rem 1.5rem;flex-direction:column;overflow-y:auto;display:none;pointer-events:none;}
.nav-drawer.open{display:flex;pointer-events:auto;animation:drawerIn .22s ease forwards;}
@keyframes drawerIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.drawer-item{padding:.9rem 0;font-size:.82rem;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--dim);border-bottom:1px solid var(--border);transition:color .2s;}
.drawer-item:hover,.drawer-item.active{color:var(--white);}
.drawer-section-label{padding:.8rem 0 .4rem;font-size:.58rem;letter-spacing:.38em;text-transform:uppercase;color:var(--dim2);}
.drawer-cta{display:flex;flex-direction:column;gap:.8rem;margin-top:.8rem;}
.drawer-cta a{display:flex;align-items:center;justify-content:center;gap:.6rem;padding:.85rem;border:2px solid;font-size:.72rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;}
.dwa{border-color:rgba(37,211,102,.6);color:var(--wa);}
.dtg{border-color:rgba(42,171,238,.6);color:var(--tg);}

/* ── CHIPS ── */
.chip{display:inline-block;padding:.2rem .55rem;font-size:.56rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;backdrop-filter:blur(8px);}
.chip-vip      {background:rgba(20,10,5,.75);border:1.5px solid rgba(212,168,67,.8);color:#f0c840;}
.chip-new      {background:rgba(5,15,25,.75);border:1.5px solid rgba(42,171,238,.8);color:#70deff;}
.chip-hot      {background:rgba(20,5,8,.75); border:1.5px solid var(--red3);         color:#ff6080;}
.chip-exclusive{background:rgba(15,5,25,.75);border:1.5px solid rgba(168,85,247,.8);color:#e0b4ff;}
.avail-dot{font-size:.56rem;font-weight:600;letter-spacing:.14em;color:#4ade80;text-transform:uppercase;padding:.2rem .55rem;background:rgba(5,20,10,.75);border:1.5px solid rgba(74,222,128,.6);backdrop-filter:blur(8px);}

/* ── PROFILE LAYOUT ── */
.profile-wrap{display:grid;grid-template-columns:52% 48%;min-height:calc(100vh - var(--nav-h));align-items:start;}
@media(max-width:900px){.profile-wrap{grid-template-columns:1fr;}}

/* ── PHOTO PANEL ── */
.photo-panel{
  position:sticky;
  top:var(--nav-h);
  display:flex;
  flex-direction:column;
  background:var(--black3);
  /* panel height = width * 16/9 but capped at viewport */
  max-height:calc(100vh - var(--nav-h));
  overflow:hidden;
}
@media(max-width:900px){
  .photo-panel{position:relative;top:0;max-height:none;}
}

/* swiper: strict 9:16 */
.photo-swiper{
  position:relative;
  width:100%;
  aspect-ratio:9/16;
  overflow:hidden;
  touch-action:pan-y;
  cursor:grab;
  background:var(--black3);
  /* shrink to fit if panel is capped */
  min-height:0;
  flex-shrink:1;
}
.photo-swiper:active{cursor:grabbing;}

.photo-slides{
  position:absolute;
  inset:0;
  display:flex;
  height:100%;
  will-change:transform;
  transition:transform .38s cubic-bezier(.4,0,.2,1);
}
.photo-slide{
  flex:0 0 100%;
  height:100%;
  position:relative;
  overflow:hidden;
}
.photo-slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  pointer-events:none;
  user-select:none;
  -webkit-user-drag:none;
}
.photo-slide-ph{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(155deg,#200810,#3a0f1e);
}

/* vignette */
.photo-swiper::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(0deg,rgba(6,3,6,.55) 0%,transparent 40%);
}

/* ── INFO PANEL ── */
.info-panel{padding:3rem 3rem 5rem;overflow-y:auto;background:var(--black);}
@media(max-width:900px){.info-panel{padding:1.8rem 1.2rem 4rem;}}
.back-link{display:inline-flex;align-items:center;gap:.4rem;font-size:.65rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);border:1.5px solid var(--border);padding:.28rem .7rem;transition:all .2s;margin-bottom:1.8rem;}
.back-link:hover{color:var(--white);border-color:var(--red3);}
.profile-number{font-size:.58rem;font-weight:600;letter-spacing:.45em;color:var(--gold);text-transform:uppercase;margin-bottom:.6rem;}
.profile-name{font-family:var(--font-d);font-size:clamp(2.6rem,5.5vw,4.8rem);letter-spacing:.04em;line-height:.95;color:var(--white);margin-bottom:.5rem;}
.profile-tagline{font-family:var(--font-s);font-style:italic;font-size:1rem;color:var(--off);margin-bottom:1.1rem;line-height:1.5;}
.tags-row{display:flex;gap:.45rem;flex-wrap:wrap;align-items:center;margin-bottom:1.6rem;}
.prof-divider{height:1px;margin:1.4rem 0;background:linear-gradient(90deg,var(--red),transparent);opacity:.45;}
.params-grid{display:flex;flex-wrap:wrap;gap:.4rem .6rem;}
.param-row{
  display:flex;align-items:baseline;gap:.35rem;
  padding:.3rem .7rem;
  background:rgba(224,32,64,.05);
  border:1px solid var(--border);
  white-space:nowrap;
}
.param-lbl{font-size:.55rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);flex-shrink:0;}
.param-val{font-size:.82rem;color:var(--white);}
@media(max-width:500px){.params-grid{grid-template-columns:1fr;}}
.param-row{padding:.75rem .9rem;border:1px solid var(--border);background:rgba(212,33,60,.04);}
.param-lbl{font-size:.56rem;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--dim2);margin-bottom:.2rem;}
.param-val{font-size:.88rem;color:var(--white);}
.bio-text{font-family:var(--font-s);font-size:.95rem;line-height:1.75;color:var(--text);}
.pricing-title{font-size:.6rem;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:var(--dim2);margin-bottom:.7rem;}
.pricing-cards{display:flex;gap:.6rem;}
.price-card{flex:1;padding:1rem 1.2rem;background:rgba(212,168,67,.06);border:1.5px solid rgba(212,168,67,.28);}
.price-dur{font-size:.58rem;font-weight:600;letter-spacing:.28em;color:var(--gold2);text-transform:uppercase;margin-bottom:.3rem;}
.price-amt{font-family:var(--font-d);font-size:1.8rem;letter-spacing:.04em;color:var(--white);line-height:1;}
.price-cur{font-size:.65rem;font-weight:600;color:var(--gold2);letter-spacing:.12em;margin-top:.2rem;}
.cta-block{display:flex;flex-direction:column;gap:.55rem;}
.cta-wa,.cta-tg{display:flex;align-items:center;justify-content:center;gap:.55rem;padding:.95rem 1.5rem;font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-family:var(--font-b);border:2px solid;transition:all .2s;}
.cta-wa{background:rgba(37,211,102,.1);border-color:rgba(37,211,102,.55);color:var(--wa);}
.cta-wa:hover{background:rgba(37,211,102,.2);}
.cta-tg{background:rgba(42,171,238,.1);border-color:rgba(42,171,238,.55);color:var(--tg);}
.cta-tg:hover{background:rgba(42,171,238,.2);}
.cta-fav{width:100%;padding:.8rem;background:transparent;border:1.5px solid var(--border);color:var(--dim);font-size:.65rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-family:var(--font-b);cursor:pointer;transition:all .2s;}
.cta-fav:hover,.cta-fav.active{border-color:#f43f5e;color:#f43f5e;background:rgba(244,63,94,.08);}

/* ── SCROLL TOP ── */
.scroll-top{position:fixed;bottom:2rem;right:2rem;z-index:800;width:42px;height:42px;background:var(--red);color:var(--white);border:none;font-size:1.1rem;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;}
.scroll-top.visible{opacity:1;pointer-events:auto;}

.btn-wa{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1.1rem;background:rgba(37,211,102,.1);border:2px solid rgba(37,211,102,.55);color:var(--wa);font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font-b);transition:all .2s;}.btn-wa:hover{background:rgba(37,211,102,.2);}
.btn-tg{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1.1rem;background:rgba(42,171,238,.1);border:2px solid rgba(42,171,238,.55);color:var(--tg);font-size:.68rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;font-family:var(--font-b);transition:all .2s;}.btn-tg:hover{background:rgba(42,171,238,.2);}



/* ── CONTRAST FIXES ── */
.nav-links-desktop a{color:var(--off) !important;}
.nav-links-desktop a:hover,.nav-links-desktop a.active{color:var(--white) !important;}
.drawer-item{color:var(--off) !important;}
.drawer-item:hover,.drawer-item.active{color:var(--white) !important;}
.card-name{color:var(--white);text-shadow:0 2px 12px rgba(0,0,0,.95);}
.card-tagline{color:var(--off);}
.card-meta{color:var(--text);}
.price-pill{color:var(--gold);border-color:rgba(224,184,64,.55);background:rgba(224,184,64,.1);}
.btn-primary{background:var(--red);border-color:var(--red);color:#fff;font-weight:700;}
.btn-primary:hover{background:var(--red2);}
.btn-wa{color:#fff;background:rgba(37,211,102,.18);border-color:rgba(37,211,102,.7);}
.btn-tg{color:#fff;background:rgba(42,171,238,.18);border-color:rgba(42,171,238,.7);}
.filters-bar{background:rgba(6,3,6,.98);}
.filter-btn{color:var(--off);border-color:rgba(224,32,64,.3);}
.filter-btn:hover,.filter-btn.active{color:#fff;border-color:var(--red3);background:rgba(224,32,64,.15);}
.models-count{color:var(--off);}
/* profile info panel */
.profile-name{color:var(--white);}
.profile-tagline{color:var(--off);}
.param-lbl{color:var(--dim);}
.param-val{color:var(--white);}
.bio-text{color:var(--off);}
.pricing-title{color:var(--dim);}
.price-dur{color:var(--gold);}
.price-amt{color:var(--white);}
.price-cur{color:var(--gold);}
.back-link{color:var(--off);border-color:rgba(224,32,64,.3);}
.back-link:hover{color:#fff;border-color:var(--red3);}
.cta-wa{color:#fff !important;}
.cta-tg{color:#fff !important;}
.cta-fav{color:var(--off);}
/* fav page */
.fav-title{color:var(--white);}
.fav-sub{color:var(--off);}
/* admin */
.panel-title{color:var(--white);}
.form-label{color:var(--off);}
.form-input,.form-select,.form-textarea{color:var(--white);border-color:rgba(224,32,64,.25);}
.row-name{color:var(--white);}
.row-meta{color:var(--off);}
.sb-link{color:var(--off);}
.sb-link:hover,.sb-link.active{color:var(--white);}
.stat-num{color:var(--white);}
.stat-lbl{color:var(--off);}
.setting-title{color:var(--off);}
.footer-logo-text{color:var(--white);}
.footer-tagline{color:var(--off);}
.footer-phone{color:var(--off);}
.footer-legal{color:var(--dim);}
/* scroll top */
.scroll-top{background:var(--red);color:#fff;font-weight:700;}
/* chips brighter */
.chip-vip{background:rgba(30,15,5,.85);border-color:rgba(224,184,64,.9);color:#ffd740;}
.chip-new{background:rgba(5,15,30,.85);border-color:rgba(42,171,238,.9);color:#60dfff;}
.chip-hot{background:rgba(30,5,10,.85);border-color:var(--red3);color:#ff6080;}
.chip-exclusive{background:rgba(20,5,35,.85);border-color:rgba(200,100,255,.9);color:#e8c0ff;}
.avail-dot{color:#60ff90;border-color:rgba(96,255,144,.7);background:rgba(5,25,10,.85);}

/* ── BACK BUTTON OVERLAY ON PHOTO ── */
.photo-back-btn{
  position:absolute;top:.9rem;left:.9rem;z-index:10;
  display:inline-flex;align-items:center;gap:.35rem;
  padding:.32rem .75rem;
  background:rgba(6,3,6,.78);
  border:1.5px solid rgba(255,255,255,.22);
  color:rgba(255,255,255,.85);
  font-family:var(--font-b);font-size:.6rem;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  text-decoration:none;
  backdrop-filter:blur(8px);
  transition:background .2s,border-color .2s,color .2s;
  cursor:pointer;
}
.photo-back-btn:hover{
  background:rgba(224,32,64,.7);
  border-color:rgba(255,80,100,.6);
  color:#fff;
}

/* hide info panel back link on desktop — photo has its own */
@media(min-width:901px){ .back-link{ display:none; } }

/* ── PAGE ENTER ANIMATION ── */
body{animation:pageIn .45s cubic-bezier(.4,0,.2,1) both;}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

/* Supabase */
async function sbLoad(){
  if(!window._sb)return null;
  try{
    const{data,error}=await window._sb.from('models').select('*').order('position');
    if(error||!data||!data.length)return null;
    // parse photos if stored as string
    return data.map(m=>{
      if(typeof m.photos==='string'){try{m.photos=JSON.parse(m.photos);}catch(e){m.photos=[];}}
      if(!Array.isArray(m.photos))m.photos=[];
      return m;
    });
  }catch(e){return null;}
}
async function sbSave(m){
  if(!window._sb)return;
  try{
    const row={...m,photos:JSON.stringify(m.photos||[])};
    await window._sb.from('models').upsert(row,{onConflict:'id'});
  }catch(e){console.warn('sbSave:',e.message);}
}
async function sbDel(id){
  if(!window._sb)return;

/* ── PHOTO SWIPER ── */
let _photos=[], _photoIdx=0;

function buildSwiper(photos, videoUrl){
  const hasPhotos = photos && photos.length;
  const slidesHtml = hasPhotos
    ? photos.map(p=>`<div class="photo-slide"><img src="${p}" alt="" loading="lazy"></div>`).join('')
    : `<div class="photo-slide"><div class="photo-slide-ph"><svg width="120" height="120" viewBox="0 0 24 24" fill="white" opacity=".08"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div></div>`;

  const dotsHtml = hasPhotos && photos.length > 1
    ? photos.map((_,i)=>`<button class="photo-dot${i===0?' active':''}" onclick="goSlide(${i})"></button>`).join('')
    : '';

  const videoHtml = videoUrl
    ? `<div class="profile-video-wrap"><video class="profile-video" controls playsinline preload="metadata"><source src="${videoUrl}"></video></div>`
    : '';

  const counterHtml = hasPhotos && photos.length > 1
    ? `<div class="photo-counter" id="photo-counter">1 / ${photos.length}</div>`
    : '';

  return `<div class="photo-panel" id="photo-panel">
    <div class="photo-swiper" id="photo-swiper">
      <a href="index.html" class="photo-back-btn">← Catalogue</a>
      ${counterHtml}
      <div class="photo-slides" id="photo-slides">${slidesHtml}</div>
    </div>
    ${dotsHtml ? `<div class="photo-dots" id="photo-dots">${dotsHtml}</div>` : ''}
    ${videoHtml}
  </div>`;
}

function goSlide(idx){
  const slides=document.getElementById('photo-slides');
  const dots=document.querySelectorAll('.photo-dot');
  const counter=document.getElementById('photo-counter');
  if(!slides)return;
  _photoIdx=Math.max(0,Math.min(idx,_photos.length-1));
  slides.style.transform=`translateX(-${_photoIdx*100}%)`;
  dots.forEach((d,i)=>d.classList.toggle('active',i===_photoIdx));
  if(counter)counter.textContent=`${_photoIdx+1} / ${_photos.length}`;
}

function initSwiperEvents(){
  const swiper=document.getElementById('photo-swiper');
  if(!swiper)return;
  // mouse drag
  let startX=0,isDrag=false;
  swiper.addEventListener('mousedown',e=>{startX=e.clientX;isDrag=true;});
  swiper.addEventListener('mousemove',e=>{if(isDrag)e.preventDefault();});
  swiper.addEventListener('mouseup',e=>{
    if(!isDrag)return;isDrag=false;
    const dx=e.clientX-startX;
    if(Math.abs(dx)<30)return;
    dx<0?goSlide(_photoIdx+1):goSlide(_photoIdx-1);
  },{passive:false});
  swiper.addEventListener('mouseleave',()=>{isDrag=false;});
  // touch
  let tx=0;
  swiper.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  swiper.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)<30)return;
    dx<0?goSlide(_photoIdx+1):goSlide(_photoIdx-1);
  },{passive:true});
}

    <div class="profile-number">${String(idx+1).padStart(3,'0')} / ${String(total).padStart(3,'0')}</div>
    <h1 class="profile-name">${m.name.toUpperCase()}</h1>
    <p class="profile-tagline">${m.tagline||''}</p>
    <div class="tags-row">${tag}${avail}</div>
    <div class="prof-divider"></div>
    <div class="params-grid">${paramsHtml}</div>
    <div class="prof-divider"></div>
    <p class="bio-text">${m.bio||''}</p>
    <div class="prof-divider"></div>
    <div class="pricing-title">Rates</div>
    <div class="pricing-cards">
      <div class="price-card"><div class="price-dur">1 Hour</div><div class="price-amt">${m.price1h||0}</div><div class="price-cur">AED</div></div>
      <div class="price-card"><div class="price-dur">2 Hours</div><div class="price-amt">${m.price2h||0}</div><div class="price-cur">AED</div></div>
    </div>
    <div class="prof-divider"></div>
    <div class="cta-block">
      <a href="${waLink}" class="cta-wa" target="_blank">${WA_LG} Book via WhatsApp</a>
      <a href="${tgLink}" class="cta-tg" target="_blank">${TG_LG} Book via Telegram</a>
      <button class="cta-fav${favActive?' active':''}" id="fav-btn" onclick="handleFav(${m.id})">${favActive?'♥ Remove from Favourites':'♡ Add to Favourites'}</button>
    </div>
  </div>`;

  document.getElementById('profile-wrap').innerHTML=photoHtml+infoHtml;
  initSwiperEvents();
}

function handleFav(id){
  const active=toggleFav(id);
  const btn=document.getElementById('fav-btn');
  if(btn){btn.textContent=active?'♥ Remove from Favourites':'♡ Add to Favourites';btn.classList.toggle('active',active);}
  updateNavBadge();
}

function showNotFound(){
  document.getElementById('profile-wrap').innerHTML=`<div style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;"><div style="font-size:3rem;opacity:.2">404</div><div style="font-size:.8rem;letter-spacing:.3em;color:var(--dim);text-transform:uppercase">Model not found</div><a href="index.html" class="back-link" style="margin-top:.5rem">← Back to Models</a></div>`;
}

async function init(){
  await initData();
  initNav();
  initScrollTop();
  const params=new URLSearchParams(location.search);
  const id=parseInt(params.get('id'));
  const all=getModels()||[];
  const idx=all.findIndex(m=>m.id===id);
  if(idx===-1){showNotFound();}else{renderProfile(all[idx],idx,all.length);}
  hideLoader();
}
init();

</script>
<script>
// Page transition out
document.addEventListener('click', function(e){
  const a = e.target.closest('a[href]');
  if(!a) return;
  const href = a.getAttribute('href');
  if(!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('tel') || a.target==='_blank') return;
  e.preventDefault();
  document.body.style.transition='opacity .22s ease, transform .22s ease';
  document.body.style.opacity='0';
  document.body.style.transform='translateY(-10px)';
  setTimeout(()=>{ location.href=href; }, 200);
});
</script>
</body>
</html>
